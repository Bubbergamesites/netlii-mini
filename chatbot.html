<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <title>Netlii | AI</title>
    <style>
        :root {
            --text-color: #1a1a1a;
            --container-bg: rgba(255, 255, 255, 0.85);
            --body-bg: #f4f4f4;
            --accent-blue: #2196F3;
            --sidebar-bg: rgba(255, 255, 255, 0.5);
            --bg-image: url('netlii-bg.avif');
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --text-color: #ffffff;
            --container-bg: rgba(15, 15, 15, 0.85);
            --body-bg: #121212;
            --sidebar-bg: rgba(0, 0, 0, 0.65);
            --bg-image: url('netlii-bg 2.avif');
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Nunito', sans-serif; background: var(--body-bg) var(--bg-image) center/cover fixed; color: var(--text-color); display: flex; overflow: hidden; transition: 0.4s; }

        /* Sidebar & History Scrollbar */
        .sidebar { width: 300px; background: var(--sidebar-bg); backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding: 25px; transition: margin-left 0.3s ease; z-index: 100; flex-shrink: 0; }
        .sidebar.collapsed { margin-left: -300px; }
        
        .chat-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            padding-right: 8px;
        }

        /* Custom Scrollbar Styles */
        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-track { background: transparent; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--text-color); border-radius: 10px; opacity: 0.2; }

        .brand { font-size: 2.2rem; letter-spacing: 5px; font-weight: 900; margin-bottom: 30px; text-align: center; }
        
        .sidebar-btn { padding: 12px; border-radius: 15px; border: 2px solid var(--text-color); background: transparent; color: var(--text-color); font-weight: 900; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .new-chat { margin-bottom: 20px; }
        .new-chat:hover { background: var(--text-color); color: var(--body-bg); }
        
        .clear-all { margin-top: 20px; border-color: #ff4747; color: #ff4747; font-size: 0.8rem; opacity: 0.7; }
        .clear-all:hover { background: #ff4747; color: white; opacity: 1; }

        .chat-item { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); font-size: 0.9rem; cursor: pointer; border: 1px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
        .chat-item:hover { border-color: var(--accent-blue); }

        /* Main Stage */
        .main { flex-grow: 1; height: 100vh; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .nav { height: 70px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .stage { flex-grow: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .msg { max-width: 85%; padding: 20px; border-radius: 25px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
        .user-msg { align-self: flex-end; background: var(--accent-blue); color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--container-bg); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        pre { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 12px; overflow-x: auto; font-family: 'Courier New', monospace; margin: 10px 0; white-space: pre; }
        
        /* SPIN FIX */
        .ri-spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .footer { padding: 20px 15% 40px; }
        .input-wrap { background: var(--container-bg); backdrop-filter: blur(20px); border-radius: 40px; padding: 10px 25px; display: flex; align-items: center; border: 2px solid var(--text-color); }
        .input-wrap input { flex-grow: 1; background: transparent; border: none; color: var(--text-color); padding: 10px; font-size: 1.1rem; outline: none; }
        .btn-send { background: var(--text-color); color: var(--body-bg); width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="brand">NETLII <span style="font-weight: 400; opacity: 0.5;">AI</span></div>
        <button class="sidebar-btn new-chat" onclick="startNewChat()"><i class="ri-add-line"></i> NEW SESSION</button>
        
        <div class="chat-list" id="history"></div>

        <button class="sidebar-btn clear-all" onclick="clearAllChats()"><i class="ri-delete-bin-line"></i> CLEAR ALL</button>
    </aside>

    <main class="main">
        <header class="nav">
            <div style="display:flex; align-items:center; gap:20px;">
                <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--text-color); font-size:1.5rem; cursor:pointer;"><i class="ri-menu-fold-line"></i></button>
                <select id="model" style="padding:8px 15px; border-radius:20px; background:var(--container-bg); color:var(--text-color); border:1px solid var(--text-color); font-weight:900;">
                     <option value="polly">Polly (beta)</option>
                    <option value="openai">GPT-4 Omni</option>
                    <option value="gemini-fast">Gemini</option>
                    <option value="qwen-coder">Qwen Coder</option>
                    <option value="gemini-search">Gemini Search</option>
                    <option value="mistral">Mistral</option>
                </select>
            </div>
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
        </header>

        <div class="stage" id="stage">
        <strong>Welcome.</strong><br>
                Use the menu icon to toggle the sidebar and "New Session" to clear the stage.<br>
                /image *prompt* to generate images<br>
                please leave it on polly unless necessary<br>
                <strong>I'm Ready when you are.</strong>
        </div>

        <footer class="footer">
            <div class="input-wrap">
                <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
                <button class="btn-send" onclick="send()"><i class="ri-send-plane-fill"></i></button>
            </div>
        </footer>
    </main>

    <script>
        const stage = document.getElementById('stage');
        const userInput = document.getElementById('input');
        const sidebar = document.getElementById('sidebar');
        const historyDiv = document.getElementById('history');
        
        const API_KEY = "sk_TkHKcauHNG90SnfTJWJ1iNzIANHKaWf6"; // Optional

        let chatId = Date.now();
        let chats = JSON.parse(localStorage.getItem('netlii_pro_vault')) || {};

        function toggleSidebar() { sidebar.classList.toggle('collapsed'); }

        function formatContent(text) {
            let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const codeRegex = /```([\s\S]*?)```/g;
            return escaped.replace(codeRegex, (match, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });
        }

        async function send() {
            const val = userInput.value.trim();
            if(!val) return;
            addMsg('user', val);
            userInput.value = '';

            const m = document.getElementById('model').value;
            const typing = showTyping();
            try {
                const res = await fetch(`https://gen.pollinations.ai/text/${encodeURIComponent(val)}?model=${m}&key=${API_KEY}`);
                const text = await res.text();
                typing.remove();
                addMsg('ai', text);
            } catch(e) { 
                typing.remove(); 
                addMsg('ai', 'Error: Connection failed.'); 
            }
        }

        function addMsg(role, content, isImg=false) {
            const div = document.createElement('div');
            div.className = `msg ${role}-msg`;
            div.innerHTML = formatContent(content);
            stage.appendChild(div);
            stage.scrollTop = stage.scrollHeight;

            if(!chats[chatId]) chats[chatId] = [];
            chats[chatId].push({role, content, isImg});
            localStorage.setItem('netlii_pro_vault', JSON.stringify(chats));
            updateHistory();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg ai-msg';
            div.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Processing...';
            stage.appendChild(div);
            stage.scrollTop = stage.scrollHeight;
            return div;
        }

        function updateHistory() {
            historyDiv.innerHTML = '';
            Object.keys(chats).sort((a,b)=>b-a).forEach(id => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.innerText = chats[id][0]?.content.substring(0,25) || 'New Chat';
                item.onclick = () => loadChat(id);
                historyDiv.appendChild(item);
            });
        }

        function clearAllChats() {
            if(confirm("Wipe all chat history?")) {
                chats = {};
                localStorage.removeItem('netlii_pro_vault');
                updateHistory();
                startNewChat();
            }
        }

        function loadChat(id) {
            chatId = id;
            stage.innerHTML = '';
            chats[id].forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.role}-msg`;
                div.innerHTML = formatContent(m.content);
                stage.appendChild(div);
            });
            stage.scrollTop = stage.scrollHeight;
        }

        function startNewChat() {
            chatId = Date.now();
            stage.innerHTML = '<div class="msg ai-msg">New session started.</div>';
            updateHistory();
        }

        userInput.onkeypress = (e) => { if(e.key==='Enter') send(); };

        const toggle = document.getElementById('theme-toggle');
        toggle.onchange = () => {
            const t = toggle.checked ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        };
        if(localStorage.getItem('theme')==='dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggle.checked = true;
        }
        updateHistory();
    </script>
</body>
</html>
