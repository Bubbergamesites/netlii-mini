    <script type="module">
    import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
    window.BareMux = BareMux;
</script>

<script>
    async function setupProxy() {
        if (!('serviceWorker' in navigator)) {
            console.error("Service Workers are not supported in this browser.");
            return;
        }

        try {
            // 1. Register the Service Worker
            const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
            
            // 2. Ensure the SW is active and controlling the page
            await navigator.serviceWorker.ready;
            
            // Force activation if there's a waiting worker
            if (reg.waiting) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

            // 3. Initialize BareMux Connection
            if (window.BareMux) {
                // Ensure the path to bareworker matches your file structure
                const conn = new window.BareMux.BareMuxConnection("./bareworker.js");
                
                // Standardize the WISP URL (Remove trailing slash for the transport)
                let wispUrl = localStorage.getItem("proxServer") || "wss://wisp.mercurywork.shop";
                if (wispUrl.endsWith('/')) wispUrl = wispUrl.slice(0, -1);
                
                await conn.setTransport(
                    "https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs", 
                    [{ wisp: wispUrl }]
                );

                // 4. Send config to the SW
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: "config",
                        wispurl: wispUrl,
                        autoswitch: true
                    });
                }
                
                console.log("NETLII Proxy: Fully Initialized");
            }
        } catch (err) {
            console.error("Proxy Setup Failed:", err);
        }
    }

    // Run setup after the page loads to prevent blocking the UI
    window.addEventListener('load', setupProxy);
</script>

   <script>
       // Updated Search Logic for Nexus-proxy
const homeSearch = document.getElementById('home-search');

function search(query) {
    const searchEngine = "https://www.google.com/search?q=";
    
    // Check if it's a URL
    if (query.includes('.') && !query.includes(' ')) {
        let url = query;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        // Redirect to the Nexus embed page with the URL
        window.location.href = `/Nexus-Proxy/#${url}`;
    } else {
        // Redirect to the Nexus embed page with a Google search
        window.location.href = `/Nexus-Proxy/#${searchEngine}${encodeURIComponent(query)}`;
    }
}

homeSearch.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const query = homeSearch.value.trim();
        if (query) {
            search(query);
        }
    }
});
   </script>
   <script>
             // Theme Toggle Logic
        const toggleSwitch = document.querySelector('#theme-toggle');
        
        function switchTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }    
        }

        toggleSwitch.addEventListener('change', switchTheme, false);

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                toggleSwitch.checked = true;
            }
        }
   </script>
