<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <title>Netlii| AI</title>
    <style>
        :root {
            --text-color: #1a1a1a;
            --container-bg: rgba(255, 255, 255, 0.85);
            --body-bg: #f4f4f4;
            --accent-blue: #2196F3;
            --sidebar-bg: rgba(255, 255, 255, 0.5);
            --bg-image: url('netlii-bg.avif');
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --text-color: #ffffff;
            --container-bg: rgba(15, 15, 15, 0.85);
            --body-bg: #121212;
            --sidebar-bg: rgba(0, 0, 0, 0.65);
            --bg-image: url('netlii-bg 2.avif');
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Nunito', sans-serif; background: var(--body-bg) var(--bg-image) center/cover fixed; color: var(--text-color); display: flex; overflow: hidden; transition: 0.4s; }

        /* Sidebar Styles */
        .sidebar { width: 300px; background: var(--sidebar-bg); backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding: 25px; transition: transform 0.3s ease; z-index: 100; position: relative; }
        .sidebar.collapsed { margin-left: -300px; }
        
        .brand { font-size: 2.2rem; letter-spacing: 5px; font-weight: 900; margin-bottom: 30px; text-align: center; }
        .new-chat { padding: 12px; border-radius: 15px; border: 2px solid var(--text-color); background: transparent; color: var(--text-color); font-weight: 900; cursor: pointer; margin-bottom: 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .new-chat:hover { background: var(--text-color); color: var(--body-bg); }
        
        .chat-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-item { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); font-size: 0.9rem; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .chat-item:hover { border-color: var(--text-color); }

        .main { flex-grow: 1; height: 100vh; display: flex; flex-direction: column; position: relative; width: 100%; }
        .nav { height: 70px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .stage { flex-grow: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .msg { max-width: 85%; padding: 20px; border-radius: 25px; line-height: 1.6; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--accent-blue); color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--container-bg); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        .image-container { width: 100%; margin-top: 15px; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.1); }
        .image-container img { width: 100%; height: auto; display: block; }

        .footer { padding: 20px 15% 40px; }
        .input-wrap { background: var(--container-bg); backdrop-filter: blur(20px); border-radius: 40px; padding: 10px 25px; display: flex; align-items: center; border: 2px solid var(--text-color); }
        .input-wrap input { flex-grow: 1; background: transparent; border: none; color: var(--text-color); padding: 10px; font-size: 1.1rem; outline: none; }
        .btn-send { background: var(--text-color); color: var(--body-bg); width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="brand"><span style="font-weight: 800">NETLII <span style="font-weight: 400; opacity: 0.5;">AI</span></div>
        <button class="new-chat" id="newChatBtn"><i class="ri-add-line"></i> NEW SESSION</button>
        <div class="chat-list" id="history"></div>
    </aside>

    <main class="main">
        <header class="nav">
            <div style="display:flex; align-items:center; gap:20px;">
                <button id="toggleBtn" style="background:none; border:none; color:var(--text-color); font-size:1.5rem; cursor:pointer;"><i class="ri-menu-fold-line"></i></button>
                <select id="modelSelect" style="padding:8px 15px; border-radius:20px; background:var(--container-bg); color:var(--text-color); border:1px solid var(--text-color); font-weight:900;">
                    <option value="polly">Polly (beta)</option>
                    <option value="openai">GPT-4 Omni</option>
                    <option value="gemini-fast">Gemini</option>
                    <option value="qwen-coder">Qwen Coder</option>
                    <option value="gemini-search">Gemini Search</option>
                    <option value="mistral">Mistral</option>
                </select>
            </div>
        </header>

        <div class="stage" id="stage">
            <div class="msg ai-msg">
                <strong>Welcome.</strong><br>
                Use the menu icon to toggle the sidebar and "New Session" to clear the stage.<br>
                /image *prompt* to generate images<br>
                I'm Ready when you are.
            </div>
        </div>

        <footer class="footer">
            <div class="input-wrap">
                <input type="text" id="userInput" placeholder="Ask anything or /image..." autocomplete="off">
                <button class="btn-send" id="sendBtn"><i class="ri-send-plane-fill"></i></button>
            </div>
        </footer>
    </main>

    <script>
        const stage = document.getElementById('stage');
        const input = document.getElementById('userInput');
        const sidebar = document.getElementById('sidebar');
        const historyDiv = document.getElementById('history');
        
        // --- API KEY ---
        const API_KEY = "sk_TkHKcauHNG90SnfTJWJ1iNzIANHKaWf6"; 

        let currentChatId = Date.now();
        let allChats = JSON.parse(localStorage.getItem('netlii_pro_vault')) || {};

        // Fix 1: Sidebar Toggle
        document.getElementById('toggleBtn').onclick = () => {
            sidebar.classList.toggle('collapsed');
        };

        // Fix 2: New Session
        document.getElementById('newChatBtn').onclick = () => {
            currentChatId = Date.now();
            stage.innerHTML = '<div class="msg ai-msg">New session started.</div>';
            updateHistoryList();
        };

        async function handleSend() {
            const val = input.value.trim();
            if(!val) return;
            renderMsg('user', val);
            input.value = '';

            if(val.toLowerCase().startsWith('/image ')) {
                const prompt = val.replace('/image ', '');
                const url = `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*1000000)}&key=${API_KEY}`;
                renderMsg('ai', url, true);
            } else {
                const model = document.getElementById('modelSelect').value;
                const typing = showTypingIndicator();
                try {
                    const res = await fetch(`https://gen.pollinations.ai/text/${encodeURIComponent(val)}?model=${model}&key=${API_KEY}`);
                    const text = await res.text();
                    typing.remove();
                    renderMsg('ai', text);
                } catch(e) { 
                    typing.remove(); 
                    renderMsg('ai', 'Error: Connection failed.'); 
                }
            }
        }

        function renderMsg(role, content, isImg=false) {
            const div = document.createElement('div');
            div.className = `msg ${role}-msg`;
            if(isImg) {
                div.innerHTML = `<div class="image-container"><img src="${content}" onload="stage.scrollTop=stage.scrollHeight"></div>`;
            } else {
                div.innerText = content;
            }
            stage.appendChild(div);
            stage.scrollTop = stage.scrollHeight;

            if(!allChats[currentChatId]) allChats[currentChatId] = [];
            allChats[currentChatId].push({role, content, isImg});
            localStorage.setItem('netlii_pro_vault', JSON.stringify(allChats));
            updateHistoryList();
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'msg ai-msg';
            div.innerHTML = '<i class="ri-loader-line ri-spin"></i> Thinking...';
            stage.appendChild(div);
            stage.scrollTop = stage.scrollHeight;
            return div;
        }

        function updateHistoryList() {
            historyDiv.innerHTML = '';
            Object.keys(allChats).sort((a,b)=>b-a).forEach(id => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.innerText = allChats[id][0]?.content.substring(0,25) || 'Empty Chat';
                item.onclick = () => {
                    currentChatId = id;
                    stage.innerHTML = '';
                    allChats[id].forEach(m => {
                        const d = document.createElement('div');
                        d.className = `msg ${m.role}-msg`;
                        if(m.isImg) d.innerHTML = `<div class="image-container"><img src="${m.content}"></div>`;
                        else d.innerText = m.content;
                        stage.appendChild(d);
                    });
                    stage.scrollTop = stage.scrollHeight;
                };
                historyDiv.appendChild(item);
            });
        }

        document.getElementById('sendBtn').onclick = handleSend;
        input.onkeypress = (e) => { if(e.key==='Enter') handleSend(); };

        // Theme Setup
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.onchange = () => {
            const mode = themeToggle.checked ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
            localStorage.setItem('theme', mode);
        };
        if(localStorage.getItem('theme')==='dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.checked = true;
        }
        updateHistoryList();
    </script>
</body>
</html>
